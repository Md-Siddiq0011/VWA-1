<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - TN 2031 Legislative Assembly</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="login">
  <main class="auth-page">
    <form class="form-panel" id="loginForm">
      <h1>Voter Login</h1>
      <p>Login to cast your vote securely.</p>
      <label>Email</label>
      <input type="email" name="email" required />
      <label>Password</label>
      <input type="password" name="password" required />
      <button type="submit">Login</button>
      <p class="small-text">New voter? <a href="register.html">Create account</a></p>
      <div class="notice" id="messageBox"></div>
    </form>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
