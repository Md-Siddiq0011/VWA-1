<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - TN 2031 Legislative Assembly</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="register">
  <main class="auth-page">
    <form class="form-panel" id="registerForm">
      <h1>Voter Registration</h1>
      <p>Create your account before voting.</p>
      <label>Name</label>
      <input type="text" name="name" required />
      <label>Email</label>
      <input type="email" name="email" required />
      <label>Password</label>
      <input type="password" name="password" required />
      <button type="submit">Register</button>
      <p class="small-text">Already registered? <a href="login.html">Login</a></p>
      <div class="notice" id="messageBox"></div>
    </form>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
